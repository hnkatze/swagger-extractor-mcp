name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -race -count=1

      - name: Test Coverage
        run: go test ./... -coverprofile=coverage.out

      - name: Coverage Summary
        run: go tool cover -func=coverage.out | tail -1
